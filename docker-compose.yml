# Producción / entorno unificado: API + PostgreSQL
# Uso: docker compose up --build
# Requiere archivo .env (copiar desde .env.example)

name: panaderia-zapatoca

services:
  db:
    image: postgres:16-alpine
    container_name: panaderia-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - panaderia-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    # Puerto solo para depuración local (opcional). En servidor quita esta sección.
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: panaderia-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8000}
      # Asegura conexión al servicio db dentro de la red Docker
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - panaderia-net

networks:
  panaderia-net:
    driver: bridge

volumes:
  postgres_data:
